version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: task_manager_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: task_manager
    ports:
      - "5433:5432"
    volumes:
      - task_manager_data:/var/lib/postgresql/data

volumes:
  task_manager_data: